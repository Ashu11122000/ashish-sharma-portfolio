version: "3.9"

services:
  portfolio:
    container_name: portfolio

    build:
      context: .
      dockerfile: Dockerfile

    image: portfolio:latest

    ports:
      - "8080:80"

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s